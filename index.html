        <h1>Công Cụ Tính Lãi Kép Online Miễn Phí</h1>
        <p>WealthtechHub cung cấp công cụ tính lãi kép online miễn phí, giúp bạn lập kế hoạch tài chính cá nhân và tính toán mức tăng trưởng tài sản dài hạn.</p>

        <h2>Công Thức Tính Lãi Kép</h2>
        <p>Công thức lãi kép cơ bản: <strong>A = P × (1 + r/n)^(n×t)</strong></p>
        <ul>
          <li><strong>A</strong>: Giá trị tương lai</li>
          <li><strong>P</strong>: Vốn ban đầu</li>
          <li><strong>r</strong>: Lãi suất năm (dạng thập phân)</li>
          <li><strong>n</strong>: Số lần tính lãi trong năm</li>
          <li><strong>t</strong>: Số năm đầu tư</li>
        </ul>

        <h2>Cách Tính Lãi Kép Hàng Tháng</h2>
        <p>Để tính lãi kép hàng tháng với khoản góp định kỳ, bạn dùng công thức: mỗi tháng cộng thêm khoản góp rồi nhân với (1 + lãi suất tháng). Công cụ của chúng tôi tự động tính toán cho bạn.</p>

        <h2>Tại Sao Lãi Kép Quan Trọng?</h2>
        <p>Lãi kép giúp tài sản tăng trưởng theo cấp số nhân. Với lãi suất 8.5%/năm, 100 triệu đồng sau 20 năm sẽ tăng lên hơn 500 triệu — gấp 5 lần so với không đầu tư.</p>

        <h2>Công Cụ Tài Chính Khác</h2>
        <ul>
          <li>Bảng giá cổ phiếu VN (FPT, VCB, VNM, HPG, TCB, MWG)</li>
          <li>Chiến lược phân bổ danh mục đầu tư (Conservative, Moderate, Aggressive)</li>
          <li>Theo dõi VN-INDEX và tỷ giá USDT/VND</li>
        </ul>
